<svg width="1200" height="190" viewBox="0 0 1200 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Career impact</title>
  <desc id="description">Principal engineer in under four years, leading across six teams, with four international startup awards and a 3.9 out of 4.0 GPA.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101C2C"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#1F6FEB"/><stop offset="1" stop-color="#79C0FF"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#238636"/><stop offset="1" stop-color="#7EE787"/></linearGradient>
    <style>
      .card { animation: breathe 5s ease-in-out infinite; }
      .card:nth-of-type(2) { animation-delay: -1.25s; }
      .card:nth-of-type(3) { animation-delay: -2.5s; }
      .card:nth-of-type(4) { animation-delay: -3.75s; }
      .spark { animation: travel 4.5s ease-in-out infinite; }
      @keyframes breathe { 0%, 100% { opacity: .86; } 50% { opacity: 1; } }
      @keyframes travel { 0%, 100% { opacity: .3; transform: translateX(0); } 50% { opacity: 1; transform: translateX(224px); } }
      @media (prefers-reduced-motion: reduce) { .card, .spark { animation: none; } }
    </style>
  </defs>

  <g class="card">
    <rect x="12" y="18" width="276" height="154" rx="18" fill="url(#card)" stroke="#30363D"/>
    <rect x="13" y="19" width="274" height="3" rx="1.5" fill="url(#blue)"/>
    <circle class="spark" cx="34" cy="20.5" r="3" fill="#DDF4FF"/>
    <text x="34" y="81" fill="#F0F6FC" font-size="38" font-weight="750" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">&lt; 4 years</text>
    <text x="34" y="112" fill="#79C0FF" font-size="14" font-weight="700" letter-spacing="1.2" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">INTERN → PRINCIPAL</text>
    <text x="34" y="143" fill="#8B949E" font-size="13" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Progress through ownership</text>
  </g>

  <g class="card">
    <rect x="312" y="18" width="276" height="154" rx="18" fill="url(#card)" stroke="#30363D"/>
    <rect x="313" y="19" width="274" height="3" rx="1.5" fill="url(#green)"/>
    <text x="334" y="81" fill="#F0F6FC" font-size="38" font-weight="750" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">6+ teams</text>
    <text x="334" y="112" fill="#7EE787" font-size="14" font-weight="700" letter-spacing="1.2" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">ARCHITECTURE SCOPE</text>
    <text x="334" y="143" fill="#8B949E" font-size="13" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">One coherent mission group</text>
  </g>

  <g class="card">
    <rect x="612" y="18" width="276" height="154" rx="18" fill="url(#card)" stroke="#30363D"/>
    <rect x="613" y="19" width="274" height="3" rx="1.5" fill="url(#blue)"/>
    <text x="634" y="81" fill="#F0F6FC" font-size="38" font-weight="750" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">4 awards</text>
    <text x="634" y="112" fill="#79C0FF" font-size="14" font-weight="700" letter-spacing="1.2" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">INTERNATIONAL STARTUP</text>
    <text x="634" y="143" fill="#8B949E" font-size="13" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">HEARIZE · deep learning</text>
  </g>

  <g class="card">
    <rect x="912" y="18" width="276" height="154" rx="18" fill="url(#card)" stroke="#30363D"/>
    <rect x="913" y="19" width="274" height="3" rx="1.5" fill="url(#green)"/>
    <text x="934" y="81" fill="#F0F6FC" font-size="38" font-weight="750" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">3.9 / 4.0</text>
    <text x="934" y="112" fill="#7EE787" font-size="14" font-weight="700" letter-spacing="1.2" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">TOP OF CLASS · HONORS</text>
    <text x="934" y="143" fill="#8B949E" font-size="13" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Computer Systems Engineering</text>
  </g>
</svg>
