<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Jihad Abu Zuhri — Principal Software Engineer</title>
  <desc id="description">An animated technical banner about backend systems, platform architecture, distributed systems, and agentic AI.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071426"/>
      <stop offset="0.52" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#07140F"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.52" stop-color="#79C0FF"/>
      <stop offset="1" stop-color="#7EE787"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(168 112) rotate(24) scale(370 250)">
      <stop stop-color="#1F6FEB" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 250) rotate(-154) scale(420 260)">
      <stop stop-color="#238636" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#238636" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#8B949E" stroke-opacity="0.065"/>
    </pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .edge { stroke-dasharray: 7 10; animation: flow 8s linear infinite; }
      .node { transform-box: fill-box; transform-origin: center; animation: pulse 3.4s ease-in-out infinite; }
      .node:nth-of-type(2n) { animation-delay: -1.2s; }
      .node:nth-of-type(3n) { animation-delay: -2.1s; }
      .halo { animation: halo 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .cursor { animation: blink 1.1s steps(2, end) infinite; }
      .status { animation: status 2.6s ease-in-out infinite; }
      .accent-line { animation: line 3.2s ease-in-out infinite; transform-origin: left; }
      @keyframes flow { to { stroke-dashoffset: -68; } }
      @keyframes pulse { 0%, 100% { opacity: .64; transform: scale(1); } 50% { opacity: 1; transform: scale(1.38); } }
      @keyframes halo { 0%, 100% { opacity: .08; transform: scale(.75); } 50% { opacity: .32; transform: scale(1.25); } }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes status { 0%, 100% { opacity: .58; } 50% { opacity: 1; } }
      @keyframes line { 0%, 100% { transform: scaleX(.72); opacity: .72; } 50% { transform: scaleX(1); opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .edge, .node, .halo, .cursor, .status, .accent-line { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <rect width="1200" height="360" rx="24" fill="url(#glowBlue)"/>
  <rect width="1200" height="360" rx="24" fill="url(#glowGreen)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="358.5" rx="23.25" stroke="#30363D" stroke-width="1.5"/>

  <circle cx="42" cy="34" r="5" fill="#FF5F56"/>
  <circle cx="62" cy="34" r="5" fill="#FFBD2E"/>
  <circle cx="82" cy="34" r="5" fill="#27C93F"/>
  <text x="108" y="39" fill="#8B949E" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">~/jihad/profile</text>
  <rect class="cursor" x="241" y="27" width="8" height="16" rx="1.5" fill="#7EE787"/>
  <g class="status">
    <circle cx="1008" cy="34" r="4" fill="#7EE787"/>
    <circle cx="1008" cy="34" r="9" fill="#7EE787" fill-opacity="0.12"/>
    <text x="1022" y="39" fill="#8B949E" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">OPEN TO CONNECT</text>
  </g>

  <g opacity="0.9">
    <path class="edge" d="M852 82L948 62L1017 105L1110 68" stroke="#58A6FF" stroke-opacity="0.42"/>
    <path class="edge" d="M948 62L906 158L1010 190L1118 142L1110 68" stroke="#7EE787" stroke-opacity="0.34"/>
    <path class="edge" d="M906 158L952 272L1064 294L1010 190" stroke="#58A6FF" stroke-opacity="0.36"/>
    <path class="edge" d="M1010 190L1064 294L1160 238L1118 142" stroke="#7EE787" stroke-opacity="0.38"/>
    <path class="edge" d="M852 82L906 158L820 246L952 272" stroke="#58A6FF" stroke-opacity="0.28"/>
    <circle class="node" cx="852" cy="82" r="4" fill="#58A6FF"/>
    <circle class="node" cx="948" cy="62" r="5" fill="#7EE787"/>
    <circle class="node" cx="1017" cy="105" r="4" fill="#58A6FF"/>
    <circle class="node" cx="1110" cy="68" r="4" fill="#7EE787"/>
    <circle class="node" cx="906" cy="158" r="5" fill="#58A6FF"/>
    <circle class="node" cx="1010" cy="190" r="7" fill="#7EE787"/>
    <circle class="node" cx="1118" cy="142" r="5" fill="#58A6FF"/>
    <circle class="node" cx="820" cy="246" r="4" fill="#7EE787"/>
    <circle class="node" cx="952" cy="272" r="4" fill="#58A6FF"/>
    <circle class="node" cx="1064" cy="294" r="5" fill="#7EE787"/>
    <circle class="node" cx="1160" cy="238" r="4" fill="#58A6FF"/>
    <circle class="halo" cx="1010" cy="190" r="22" fill="#7EE787" fill-opacity="0.2" filter="url(#softGlow)"/>
  </g>

  <text x="76" y="112" fill="#7EE787" font-size="16" font-weight="700" letter-spacing="2.5" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">PRINCIPAL SOFTWARE ENGINEER</text>
  <text x="72" y="188" fill="#F0F6FC" font-size="60" font-weight="750" letter-spacing="-1.7" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Jihad Abu Zuhri</text>
  <rect class="accent-line" x="76" y="212" width="112" height="4" rx="2" fill="url(#accent)"/>
  <text x="76" y="263" fill="#D8E0EA" font-size="18" font-weight="600" letter-spacing="0.15" font-family="Inter, Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">BACKEND SYSTEMS  ·  PLATFORM ARCHITECTURE  ·  DISTRIBUTED SYSTEMS</text>
  <text x="76" y="301" fill="#79C0FF" font-size="16" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">agentic_ai</text>
  <text x="171" y="301" fill="#8B949E" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">:</text>
  <text x="192" y="301" fill="#C9D1D9" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">building tools that multiply engineering judgment</text>
  <text x="76" y="332" fill="#8B949E" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">Nablus, Palestine  •  architecture that scales beyond a single team</text>

  <rect x="1155.5" y="17.5" width="23" height="25" rx="4.5" stroke="#8B949E" stroke-opacity="0.55"/>
  <rect x="1156" y="18" width="22" height="8" rx="4" fill="#000"/>
  <rect x="1156" y="26" width="22" height="8" fill="#F0F6FC"/>
  <rect x="1156" y="34" width="22" height="8" rx="4" fill="#007A3D"/>
  <path d="M1156 18L1166 30L1156 42V18Z" fill="#CE1126"/>
</svg>
