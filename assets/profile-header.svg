<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Jihad Abu Zuhri — Principal Software Engineer</title>
  <desc id="description">A dark, technical banner highlighting backend systems, platform architecture, distributed systems, and agentic AI.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#07120F"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.52" stop-color="#7EE787"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(182 86) rotate(24) scale(350 220)">
      <stop stop-color="#1F6FEB" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 270) rotate(-154) scale(370 210)">
      <stop stop-color="#238636" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#238636" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
